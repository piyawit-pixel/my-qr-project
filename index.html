<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUT Hospital - QR Scanner</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        :root { --sut-orange: #E65100; --sut-gold: #FFB300; --bg: #F5F7FA; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: var(--sut-orange); font-size: 24px; margin-bottom: 10px; }
        #reader { width: 100%; max-width: 400px; border: 5px solid var(--sut-orange); border-radius: 20px; overflow: hidden; background: white; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        #status-box { width: 100%; max-width: 370px; margin-top: 20px; padding: 20px; border-radius: 15px; text-align: center; font-weight: 500; transition: all 0.3s; background: white; border: 1px solid #ddd; }
        .success { background: #4CAF50 !important; color: white; border: none !important; }
        .error { background: #f44336 !important; color: white; border: none !important; }
        .btn-reload { margin-top: 15px; padding: 12px 30px; background: var(--sut-gold); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; display: none; }
    </style>
</head>
<body>

    <h1>🏥 SUT Hospital Asset</h1>
    <div id="reader"></div>
    
    <div id="status-box">🔄 กำลังเชื่อมต่อระบบติดตาม...</div>
    <button id="reloadBtn" class="btn-reload" onclick="location.reload()">สแกนจุดถัดไป</button>

    <script>
        // *** ใส่ URL ของคุณตรงนี้ ***
        const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbzgBQsZb3fO_d1QE-ztluNh6gwXDz72aNHNUWcZnTyrO6J1jjsI9LT7nQ7FgedA0tA/exec";
        
        // เชื่อมต่อ HiveMQ (Real-time)
        const client = mqtt.connect('wss://5c43f9d08b6f48a9a160fe907db23534.s1.eu.hivemq.cloud:8884/mqtt', {
            username: 'pizza_user',
            password: 'Password123'
        });

        const statusBox = document.getElementById('status-box');
        const reloadBtn = document.getElementById('reloadBtn');

        client.on('connect', () => {
            statusBox.innerText = "✅ ระบบพร้อมสแกน (รพ.มทส.)";
        });

        // 1. เพิ่มตัวแปรไว้ด้านบนสุด (นอกฟังก์ชัน)
        let isProcessing = false; // ตัวล็อคระดับ Global

        function onScanSuccess(decodedText) {
            // 1. ล็อคทันที! ถ้ากำลังทำงานอยู่ให้ดีดออกเลย
            if (isProcessing) return; 
            isProcessing = true; 

            // 2. ปิดกล้องทันที! (นี่คือท่าไม้ตายหยุดการสแกนซ้ำ)
            html5QrcodeScanner.clear().then(() => {
                console.log("ปิดกล้องเรียบร้อย เพื่อป้องกันการสแกนซ้ำ");
            }).catch(err => console.error("ปิดกล้องไม่สำเร็จ", err));

            statusBox.innerText = "⌛ กำลังบันทึกข้อมูล (มทส.)...";
            statusBox.className = "waiting";

            // --- ส่วนการส่งข้อมูลเดิมของคุณ ---
            client.publish('hospital/track', decodedText, { qos: 1 });

            try {
                let cleanText = decodeURIComponent(decodeURIComponent(decodedText)).trim();
                const data = JSON.parse(cleanText);
        
                const img = new Image();
                // ใส่ Timestamp ละเอียดระดับมิลลิวินาทีป้องกัน Cache
                const url = `${GOOGLE_URL}?n=${encodeURIComponent(data.name)}&la=${data.lat}&lo=${data.lng}&t=${Date.now()}`;
        
                img.onload = img.onerror = function() {
                    statusBox.innerText = "🚀 บันทึกเรียบร้อย! (1 รายการ)";
                    statusBox.className = "success";
                    document.getElementById('reloadBtn').style.display = "block";
            
                    // ปลดล็อคหลังจาก 3 วินาที เผื่อเจ้าหน้าที่จะกดสแกนใหม่
                    setTimeout(() => { isProcessing = false; }, 3000);
                };
                img.src = url;

            } catch (e) {
                console.error("JSON Error:", e);
                statusBox.innerText = "❌ รูปแบบ QR ไม่ถูกต้อง";
                isProcessing = false;
                // ถ้า Error ให้เปิดกล้องใหม่เผื่อสแกนซ่อม
                location.reload(); 
            }
        }
        // ตั้งค่ากล้อง
        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
            fps: 15, 
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0
        });
        
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
